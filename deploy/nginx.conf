# =============================================================================
# Alumni Event Management System — Nginx (production)
# Serves the Laravel API and the built React SPA. Adjust server_name + paths.
# =============================================================================

# ---- API backend (Laravel) : api.ams.example.com ----------------------------
server {
    listen 80;
    server_name api.ams.example.com;

    # Redirect all HTTP → HTTPS (certbot manages the 443 block below).
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.ams.example.com;

    root /var/www/ams/backend/public;
    index index.php;

    ssl_certificate     /etc/letsencrypt/live/api.ams.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.ams.example.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    client_max_body_size 20M;          # ticket/banner/logo uploads
    charset utf-8;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Gzip
    gzip on;
    gzip_types text/plain application/json application/javascript text/css application/xml;
    gzip_min_length 1024;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    # Cache the storage symlink assets (avatars, banners, tickets).
    location ^~ /storage/ {
        expires 7d;
        add_header Cache-Control "public";
    }

    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
        fastcgi_read_timeout 120;
    }

    location ~ /\.(?!well-known).* { deny all; }
    error_log  /var/log/nginx/ams-api.error.log;
    access_log /var/log/nginx/ams-api.access.log;
}

# ---- Frontend SPA (static build) : ams.example.com --------------------------
server {
    listen 443 ssl http2;
    server_name ams.example.com;

    root /var/www/ams/frontend/dist;
    index index.html;

    ssl_certificate     /etc/letsencrypt/live/ams.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ams.example.com/privkey.pem;

    gzip on;
    gzip_types text/plain application/json application/javascript text/css application/xml image/svg+xml;

    # Long-cache hashed assets, never cache index.html.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # SPA history fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }

    error_log  /var/log/nginx/ams-web.error.log;
    access_log /var/log/nginx/ams-web.access.log;
}
